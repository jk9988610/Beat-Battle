<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="bb-app-version" content="1.9.2" />
    <meta name="bb-app-build" content="dev" />
    <meta name="description" content="Beat Battle 音频盲评 — 上传、评阅、云端同步、赛季排名" />
    <title>Beat Battle · 音频评阅</title>
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body>
    <nav class="top-nav">
      <a href="#home" class="nav-brand">Beat Battle</a>
      <div class="nav-actions">
        <button type="button" class="btn ghost btn-sm" id="btn-update" title="检查并更新到最新版本">更新</button>
        <button type="button" class="btn ghost btn-sm" id="btn-copy-debug" title="复制版本与运行状态">调试</button>
        <button type="button" id="nav-settings-btn" class="nav-settings-btn">设置</button>
      </div>
      <div class="nav-meta">
        <span id="nav-version" class="nav-version bb-version-badge" title="构建版本"><span class="bb-version-label">…</span></span>
        <span id="copy-debug-toast" class="copy-toast" hidden>已复制</span>
        <span id="nav-sync" title="云同步状态">💾</span>
        <span id="nav-season">S1</span>
        <span id="nav-user">未登录</span>
      </div>
    </nav>
    <main id="app"><div class="card empty-state"><p>加载中…</p></div></main>
    <div id="library-preview-dock" class="library-preview-dock" hidden>
      <span class="library-preview-label">制作库试听</span>
      <audio
        id="library-preview-player"
        controls
        playsinline
        webkit-playsinline
        class="audio-player library-preview"
      ></audio>
    </div>
    <script>
      window.__bbForceReload = function () {
        var u = new URL(location.href);
        u.searchParams.set('_', String(Date.now()));
        if (typeof caches !== 'undefined') {
          caches.keys().then(function (keys) {
            return Promise.all(keys.map(function (k) { return caches.delete(k); }));
          }).finally(function () { location.replace(u.toString()); });
        } else {
          location.replace(u.toString());
        }
      };
      document.addEventListener('DOMContentLoaded', function () {
        var btn = document.getElementById('btn-update');
        if (btn) {
          btn.addEventListener('click', function () {
            setTimeout(function () {
              if (!window.__bbAppReady && typeof window.__bbForceReload === 'function') {
                window.__bbForceReload();
              }
            }, 600);
          });
        }
        setTimeout(function () {
          var app = document.getElementById('app');
          if (app && /加载中/.test(app.textContent) && !window.__bbAppReady) {
            app.innerHTML =
              '<div class="card empty-state"><p>加载时间较长</p><p class="hint">可能是网络或脚本未响应。</p>' +
              '<button type="button" class="btn primary" id="btn-stuck-reload">强制刷新</button></div>';
            document.getElementById('btn-stuck-reload')?.addEventListener('click', window.__bbForceReload);
          }
        }, 15000);
      });
    </script>
    <script type="module" src="js/entry.js"></script>
  </body>
</html>
