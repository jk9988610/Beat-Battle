name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp build version
        run: |
          SHA=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y%m%d-%H%M%S)
          BUILD="${SHA}-${DATE}"
          node -e "
            const fs = require('fs');
            const v = JSON.parse(fs.readFileSync('version.json', 'utf8'));
            v.build = '${BUILD}';
            fs.writeFileSync('version.json', JSON.stringify(v, null, 2) + '\n');
            console.log('Stamped:', v.version, v.build);
          "
          cat version.json
          node -e "
            const fs = require('fs');
            const v = JSON.parse(fs.readFileSync('version.json', 'utf8'));
            let html = fs.readFileSync('index.html', 'utf8');
            html = html.replace(/name=\"bb-app-version\" content=\"[^\"]*\"/, 'name=\"bb-app-version\" content=\"' + v.version + '\"');
            html = html.replace(/name=\"bb-app-build\" content=\"[^\"]*\"/, 'name=\"bb-app-build\" content=\"' + v.build + '\"');
            fs.writeFileSync('index.html', html);
            console.log('Stamped index meta:', v.version, v.build);
          "

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
